server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/rss+xml
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  location ^~ /_astro/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location ^~ /_data/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Robots-Tag "noindex" always;
    try_files $uri =404;
  }

  location ^~ /drivers/ {
    add_header X-Robots-Tag "noindex, follow" always;
    try_files $uri $uri/ =404;
  }

  location ^~ /teams/ {
    add_header X-Robots-Tag "noindex, follow" always;
    try_files $uri $uri/ =404;
  }

  location ^~ /compare/ {
    add_header X-Robots-Tag "noindex, follow" always;
    try_files $uri $uri/ =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
